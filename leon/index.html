// 当前正在播放的句子编号（用于判断暂停状态）
var currentPlayingNum = 0;
var isPausedOnCard = false;

// 生成卡片
function renderCards() {
  var html = '';
  subtitles.forEach(function(s) {
    html += '<div class="card" id="card' + s.num + '" data-num="' + s.num + '" data-time="' + s.time + '">';
    html += '<div class="card-num">#' + String(s.num).padStart(3,'0') + ' · ' + formatTime(s.time) + '</div>';
    html += '<div class="card-en">' + s.en + '</div>';
    html += '<div class="card-zh">' + s.zh + '</div>';
    html += '<div class="play-hint">👆 点击播放 · 再点暂停</div>';
    html += '</div>';
  });
  document.getElementById('cardList').innerHTML = html;
}

function formatTime(sec) {
  var m = Math.floor(sec / 60);
  var s = Math.floor(sec % 60);
  return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
}

// 加载/保存进度
function loadProgress() {
  try { var d = JSON.parse(localStorage.getItem(STORAGE_KEY)); return d && d.completed ? d : {completed:[], lastCard:0}; }
  catch(e) { return {completed:[], lastCard:0}; }
}
function saveProgress(d) {
  d.timestamp = Date.now();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
}

// 更新UI
function updateProgressUI() {
  var p = loadProgress();
  var n = p.completed.length;
  var t = subtitles.length;
  var pct = Math.round(n / t * 100);
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = '已学 ' + n + '/' + t + ' (' + pct + '%)';
  subtitles.forEach(function(s) {
    var c = document.getElementById('card' + s.num);
    if (c) { p.completed.includes(s.num) ? c.classList.add('completed') : c.classList.remove('completed'); }
  });
  if (n >= t) document.getElementById('completeMsg').style.display = 'block';
}

// 标记会了（长按或双击）
function markDone(n) {
  var p = loadProgress();
  if (!p.completed.includes(n)) { p.completed.push(n); p.lastCard = n; saveProgress(p); updateProgressUI(); }
}

// 高亮当前卡片
function highlightCard(n) {
  document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('active'); c.classList.remove('paused'); });
  var c = document.getElementById('card' + n);
  if (c) { c.classList.add('active'); c.scrollIntoView({behavior:'smooth', block:'center'}); }
}

// 标记暂停状态
function markPaused(n) {
  document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('paused'); });
  var c = document.getElementById('card' + n);
  if (c) { c.classList.add('paused'); }
}

// 核心：点击卡片 → 播放或暂停
function onCardClick(num) {
  var sub = subtitles.find(function(s) { return s.num === num; });
  if (!sub) return;

  // 如果当前正在播放这句话，且处于暂停状态 → 继续播放
  if (currentPlayingNum === num && isPausedOnCard) {
    audio.play();
    isPausedOnCard = false;
    highlightCard(num);
    return;
  }

  // 如果当前正在播放这句话，且正在播放 → 暂停
  if (currentPlayingNum === num && !audio.paused) {
    audio.pause();
    isPausedOnCard = true;
    markPaused(num);
    return;
  }

  // 播放新的一句
  audio.currentTime = sub.time;
  audio.play();
  currentPlayingNum = num;
  isPausedOnCard = false;
  highlightCard(num);
}

// 绑定卡片点击事件
function bindCardEvents() {
  subtitles.forEach(function(s) {
    var card = document.getElementById('card' + s.num);
    if (card) {
      card.addEventListener('click', function(e) {
        e.preventDefault();
        onCardClick(s.num);
      });
      // 双击标记会了
      card.addEventListener('dblclick', function(e) {
        e.preventDefault();
        markDone(s.num);
      });
      // 长按标记会了
      var pressTimer;
      card.addEventListener('touchstart', function(e) {
        pressTimer = setTimeout(function() { markDone(s.num); }, 800);
      });
      card.addEventListener('touchend', function() { clearTimeout(pressTimer); });
      card.addEventListener('touchmove', function() { clearTimeout(pressTimer); });
    }
  });
}

// 音频时间更新 → 高亮当前句子
audio.addEventListener('timeupdate', function() {
  var c = audio.currentTime;
  var d = audio.duration || 780;
  document.getElementById('audioTime').textContent = formatTime(c) + ' / ' + formatTime(d);

  for (var i = subtitles.length - 1; i >= 0; i--) {
    if (c >= subtitles[i].time) {
      if (currentPlayingNum !== subtitles[i].num) {
        currentPlayingNum = subtitles[i].num;
        isPausedOnCard = false;
        highlightCard(subtitles[i].num);
      }
      break;
    }
  }
});

// 播放结束 → 清除状态
audio.addEventListener('ended', function() {
  currentPlayingNum = 0;
  isPausedOnCard = false;
  document.querySelectorAll('.card').forEach(function(c) { c.classList.remove('active'); c.classList.remove('paused'); });
});

// 键盘空格键暂停/继续
document.addEventListener('keydown', function(e) {
  if (e.key === ' ' && e.target === document.body) {
    e.preventDefault();
    if (audio.paused) { audio.play(); isPausedOnCard = false; if (currentPlayingNum) highlightCard(currentPlayingNum); }
    else { audio.pause(); isPausedOnCard = true; if (currentPlayingNum) markPaused(currentPlayingNum); }
  }
});

// 初始化
renderCards();
bindCardEvents();
updateProgressUI();
</script>
<button class="back-to-top" id="backToTop" title="回到顶部" aria-label="回到顶部">↑</button>

<script>
// 回到顶部
(function(){
  var btn = document.getElementById('backToTop');
  if(!btn) return;
  window.addEventListener('scroll', function(){
    btn.classList.toggle('show', window.scrollY > 400);
  });
  btn.addEventListener('click', function(){
    window.scrollTo({top:0, behavior:'smooth'});
  });
})();
</script>

<script>
// 滚动渐入动画
(function(){
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;
  var els = document.querySelectorAll('.fade-in');
  if (!els.length) return;
  var obs = new IntersectionObserver(function(entries){
    entries.forEach(function(e){
      if(e.isIntersecting){ e.target.classList.add('visible'); obs.unobserve(e.target); }
    });
  }, {threshold: 0.1, rootMargin: '0px 0px -40px 0px'});
  els.forEach(function(el){ obs.observe(el); });
})();
</script>
